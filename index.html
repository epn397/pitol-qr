<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

<h1>QR Code Generator</h1>

<input
type="text"
id="text"
placeholder="Enter Text or URL">

<div class="buttons">

<button id="generate">
Generate QR

</button>

<button id="download">

Download

</button>

</div>

<div class="qr-box">

<img id="qr">

</div>

<div class="history-title">

History

</div>

<div id="history"></div>

<button class="clear" id="clear">

Clear All History

</button>

</div>

<script src="script.js"></script>

</body>
</html>
